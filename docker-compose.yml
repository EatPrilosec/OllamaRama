version: '3.8'

services:
  ollamarama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: OllamaRama
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_PORTS=11430-11433,11435
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
    networks:
      - ollama_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ollama_network:
    driver: bridge
